# Liquibase BTEQ Executor Demo Configuration
# This file demonstrates how to configure Liquibase to use the BTEQ native executor
#
# Copy this file to liquibase.properties and fill in your password:
#   cp liquibase.properties.example liquibase.properties

# ============================================================================
# Classpath Configuration
# ============================================================================
# Add the BTEQ executor extension to Liquibase's classpath
# Includes Teradata JDBC driver and liquibase-teradata extension from local Maven repository
# classpath=../target/bteq-executor-1.0.0-SNAPSHOT.jar:~/.m2/repository/com/teradata/jdbc/terajdbc/20.00.00.43/terajdbc-20.00.00.43.jar:~/.m2/repository/org/liquibase/ext/liquibase-teradata/4.29.1/liquibase-teradata-4.29.1.jar

# ============================================================================
# Teradata Connection (TD2 Authentication)
# ============================================================================
# Standard Teradata connection using TD2 (username/password) authentication
# Using test server - update for your environment
url=jdbc:teradata://98.81.226.121/DATABASE=bteq_demo,DBS_PORT=1025,CHARSET=UTF8
driver=com.teradata.jdbc.TeraDriver
username=dbc
password=

# ============================================================================
# BTEQ Executor Configuration
# ============================================================================
# All properties use the liquibase.bteq.* namespace

# Path to BTEQ executable (default: searches PATH)
# Uncomment and modify if BTEQ is not in your PATH
liquibase.bteq.path=/Library/Application Support/teradata/client/20.00/bin/bteq

# Execution timeout in seconds (default: -1, disabled)
# Set to positive value to enforce timeout, e.g., 300 for 5 minutes
# -1 = no timeout (recommended for production)
liquibase.bteq.timeout=-1

# Keep temporary scripts for debugging (default: false)
# When enabled, credentials are REDACTED in saved files
# Useful for troubleshooting BTEQ script generation
liquibase.bteq.keep.temp=false

# Directory for temporary script retention (default: system temp directory)
# Only used when liquibase.bteq.keep.temp=true
liquibase.bteq.keep.temp.path=/tmp

# Filename prefix for retained scripts (default: bteq-debug)
# Only used when liquibase.bteq.keep.temp=true
# Scripts are saved as: <name>-<timestamp>.bteq
liquibase.bteq.keep.temp.name=bteq-debug

# Additional BTEQ command-line arguments (optional)
# Example: liquibase.bteq.args=-e -q
# Leave commented unless you need to pass specific BTEQ flags
# liquibase.bteq.args=

# Character set override (default: from JDBC URL)
# BTEQ will use the charset from the JDBC URL by default
# Only set this if you need to override the JDBC URL charset
# liquibase.bteq.charset=UTF8

# BTEQ log file path (optional)
# Uncomment to enable BTEQ session logging
# liquibase.bteq.logfile=/tmp/bteq.log

liquibase.bteq.maxerror=0


